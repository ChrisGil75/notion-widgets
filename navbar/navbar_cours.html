<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nav — Évaluations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f2942; font-family: 'DM Sans', sans-serif; }
  nav {
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    height: 44px;
    background: #0f2942;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .context-label {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 8px;
    padding-right: 12px;
    border-right: 1px solid rgba(255,255,255,0.12);
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  a:hover { background: rgba(255,255,255,0.1); color: #fff; }
  a.active {
    background: rgba(234,174,63,0.18);
    color: #eaae3f;
    font-weight: 500;
  }
  .sep {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.12);
    margin: 0 4px;
    flex-shrink: 0;
  }
  .home { color: rgba(255,255,255,0.4); font-size: 14px; padding: 5px 8px; }
  .home:hover { color: #fff; background: rgba(255,255,255,0.08); }
</style>
</head>
<body>
<nav>
