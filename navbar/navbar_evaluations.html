<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nav — Évaluations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 44px; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: transparent; }
  nav {
    display: flex;
    align-items: center;
    padding: 0 1rem;
    height: 44px;
    background: #f7f6f3;
    border-bottom: 1.5px solid #e3e2de;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .context-label {
    font-size: 11px;
    font-weight: 500;
    color: #9b9a97;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 6px;
    padding-right: 10px;
    border-right: 1.5px solid #e3e2de;
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 400;
    color: #6b6b6b;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.12s, color 0.12s;
  }
  a:hover { background: #ebebea; color: #1a1a1a; }
  a.active {
    background: #0f2942;
    color: #eaae3f;
    font-weight: 500;
  }
  a.active:hover { background: #1a3d5c; }
  .sep { width: 1.5px; height: 16px; background: #e3e2de; margin: 0 6px; flex-shrink: 0; }
  .home { font-size: 15px; padding: 4px 8px; color: #9b9a97; }
  .home:hover { color: #1a1a1a; background: #ebebea; }
</style>
</head>
<body>
<nav>
